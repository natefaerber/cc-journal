{{define "content"}}
<div class="flex items-center gap-3 mb-6">
  <a href="/" class="text-muted-foreground hover:text-foreground transition-colors text-sm font-sans">&larr; Dashboard</a>
</div>

<div class="flex items-center justify-between mb-6">
  <h1 class="text-2xl font-bold tracking-tight">{{.Title}}</h1>
  <div class="flex items-center gap-2">
    <button onclick="toggleView()" id="toggle-btn"
            class="inline-flex items-center gap-2 bg-card border border-border rounded-md px-3 py-1.5 text-xs font-sans text-muted-foreground hover:border-accent hover:text-accent shadow-sm hover:shadow-md transition-all cursor-pointer">
      <svg id="toggle-icon-code" class="w-3.5 h-3.5 hidden" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 4L1 8l4 4"/><path d="M11 4l4 4-4 4"/>
      </svg>
      <svg id="toggle-icon-rendered" class="w-3.5 h-3.5" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 4h12M2 8h8M2 12h10"/>
      </svg>
      <span id="toggle-label">Raw</span>
    </button>
    <button onclick="copyReport()" id="copy-btn"
            class="inline-flex items-center gap-2 bg-card border border-border rounded-md px-3 py-1.5 text-xs font-sans text-muted-foreground hover:border-accent hover:text-accent shadow-sm hover:shadow-md transition-all cursor-pointer">
      <svg class="w-3.5 h-3.5" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="5" y="5" width="8" height="8" rx="1"/><path d="M3 11V3a1 1 0 011-1h8"/>
      </svg>
      Copy
    </button>
  </div>
</div>

{{if .ReportHTML}}
<div id="report-rendered" class="bg-card border border-border rounded-lg p-6 text-sm leading-relaxed text-foreground shadow-sm prose prose-sm max-w-none">
  {{.ReportHTML}}
</div>
{{end}}

<pre id="report-text" class="bg-card border border-border rounded-lg p-6 text-sm leading-relaxed whitespace-pre-wrap font-mono text-foreground overflow-x-auto shadow-sm {{if .ReportHTML}}hidden{{end}}">{{.ReportText}}</pre>

<style>
  .prose h1, .prose h2, .prose h3 { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
  .prose strong { color: var(--color-foreground); font-weight: 600; }
  .prose em { color: var(--color-muted-foreground); }
  .prose code { background: var(--color-muted); padding: 0.15em 0.35em; border-radius: 0.25rem; font-size: 0.85em; }
  .prose ul { list-style: disc; padding-left: 1.5em; margin: 0.5em 0; }
  .prose li { margin: 0.25em 0; }
  .prose p { margin: 0.5em 0; }
  .prose a { color: var(--color-accent); text-decoration: underline; }
  .prose ul ul { list-style: circle; margin: 0.25em 0; }
</style>

<script>
var showRendered = {{if .ReportHTML}}true{{else}}false{{end}};

function toggleView() {
  showRendered = !showRendered;
  var rendered = document.getElementById('report-rendered');
  var raw = document.getElementById('report-text');
  var label = document.getElementById('toggle-label');
  var iconCode = document.getElementById('toggle-icon-code');
  var iconRendered = document.getElementById('toggle-icon-rendered');

  if (showRendered && rendered) {
    rendered.classList.remove('hidden');
    raw.classList.add('hidden');
    label.textContent = 'Raw';
    iconCode.classList.add('hidden');
    iconRendered.classList.remove('hidden');
  } else {
    if (rendered) rendered.classList.add('hidden');
    raw.classList.remove('hidden');
    label.textContent = 'Rendered';
    iconCode.classList.remove('hidden');
    iconRendered.classList.add('hidden');
  }
}

function copyReport() {
  var text = document.getElementById('report-text').textContent;
  navigator.clipboard.writeText(text).then(function() {
    var btn = document.getElementById('copy-btn');
    btn.innerHTML = '<svg class="w-3.5 h-3.5" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8l3 3 7-7"/></svg> Copied';
    btn.classList.add('border-accent', 'text-accent');
    setTimeout(function() {
      btn.innerHTML = '<svg class="w-3.5 h-3.5" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="5" width="8" height="8" rx="1"/><path d="M3 11V3a1 1 0 011-1h8"/></svg> Copy';
      btn.classList.remove('border-accent', 'text-accent');
    }, 2000);
  });
}
</script>
{{end}}
