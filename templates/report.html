{{define "content"}}
<div class="flex items-center gap-3 mb-6">
  <a href="/" class="text-muted-foreground hover:text-foreground transition-colors text-sm font-sans">&larr; Dashboard</a>
</div>

<div class="flex items-center justify-between mb-6">
  <h1 class="text-2xl font-bold tracking-tight">{{.Title}}</h1>
  <button onclick="copyReport()" id="copy-btn"
          class="inline-flex items-center gap-2 bg-card border border-border rounded-md px-3 py-1.5 text-xs font-sans text-muted-foreground hover:border-accent hover:text-accent shadow-sm hover:shadow-md transition-all cursor-pointer">
    <svg class="w-3.5 h-3.5" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <rect x="5" y="5" width="8" height="8" rx="1"/><path d="M3 11V3a1 1 0 011-1h8"/>
    </svg>
    Copy
  </button>
</div>

<pre id="report-text" class="bg-card border border-border rounded-lg p-6 text-sm leading-relaxed whitespace-pre-wrap font-mono text-foreground overflow-x-auto shadow-sm">{{.ReportText}}</pre>

<script>
function copyReport() {
  var text = document.getElementById('report-text').textContent;
  navigator.clipboard.writeText(text).then(function() {
    var btn = document.getElementById('copy-btn');
    btn.innerHTML = '<svg class="w-3.5 h-3.5" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8l3 3 7-7"/></svg> Copied';
    btn.classList.add('border-accent', 'text-accent');
    setTimeout(function() {
      btn.innerHTML = '<svg class="w-3.5 h-3.5" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="5" width="8" height="8" rx="1"/><path d="M3 11V3a1 1 0 011-1h8"/></svg> Copy';
      btn.classList.remove('border-accent', 'text-accent');
    }, 2000);
  });
}
</script>
{{end}}
