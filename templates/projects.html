{{define "content"}}
<div class="flex items-center gap-3 mb-6">
  <a href="/" class="text-muted-foreground hover:text-foreground transition-colors text-sm font-sans">&larr; Dashboard</a>
</div>

<h1 class="text-2xl font-bold mb-1 tracking-tight">All Projects</h1>
<div class="flex items-center gap-3 mb-6">
  <p class="text-sm text-muted-foreground font-sans">{{len .ProjectsList}} projects</p>
  <div class="flex-1 max-w-xs">
    <input id="project-filter" type="text" placeholder="Filter projects…"
      class="w-full bg-muted/50 border border-border rounded-md px-3 py-1.5 text-xs font-mono text-foreground placeholder:text-muted-foreground outline-none focus:border-accent focus:ring-1 focus:ring-accent/30 transition-colors"
      autocomplete="off" spellcheck="false">
  </div>
  <p id="filter-count" class="text-sm text-muted-foreground font-sans hidden"></p>
</div>

<div class="overflow-x-auto rounded-lg border border-border bg-card shadow-sm">
  <table class="w-full text-sm font-sans">
    <thead>
      <tr class="border-b border-border">
        <th class="text-left px-3 py-2 text-[0.6rem] uppercase tracking-widest text-muted-foreground font-semibold">Project</th>
        <th class="text-right px-3 py-2 text-[0.6rem] uppercase tracking-widest text-muted-foreground font-semibold">Sessions</th>
        <th class="text-left px-3 py-2 text-[0.6rem] uppercase tracking-widest text-muted-foreground font-semibold">Last Active</th>
      </tr>
    </thead>
    <tbody>
      {{range .ProjectsList}}
      <tr class="border-b border-border/50 hover:bg-muted/30 transition-colors">
        <td class="px-3 py-2">
          <a href="/project/{{.Name}}" class="text-sm font-mono text-secondary hover:text-accent transition-colors font-medium">{{.Name}}</a>
        </td>
        <td class="px-3 py-2 text-right">
          <span class="bg-accent text-accent-foreground px-1.5 py-0.5 rounded text-[0.6rem] font-bold font-sans">{{.Count}}</span>
        </td>
        <td class="px-3 py-2 text-xs font-mono text-muted-foreground">{{.LastDate}}</td>
      </tr>
      {{end}}
    </tbody>
  </table>
</div>

<script>
(function() {
  var allRows = Array.from(document.querySelectorAll('tbody tr'));
  var input = document.getElementById('project-filter');
  var countEl = document.getElementById('filter-count');
  var visible = allRows;
  var idx = -1;

  function filterRows() {
    var q = input.value.toLowerCase();
    idx = -1;
    visible = [];
    allRows.forEach(function(row) {
      var name = row.querySelector('a').textContent.toLowerCase();
      var show = !q || name.indexOf(q) !== -1;
      row.style.display = show ? '' : 'none';
      row.classList.remove('bg-accent/10');
      if (show) visible.push(row);
    });
    if (q) {
      countEl.textContent = visible.length + ' match' + (visible.length !== 1 ? 'es' : '');
      countEl.classList.remove('hidden');
    } else {
      countEl.classList.add('hidden');
    }
  }

  input.addEventListener('input', filterRows);

  function focus(i) {
    if (i < 0 || i >= visible.length) return;
    if (idx >= 0 && idx < visible.length) visible[idx].classList.remove('bg-accent/10');
    idx = i;
    visible[idx].classList.add('bg-accent/10');
    visible[idx].scrollIntoView({block: 'nearest'});
  }

  document.addEventListener('keydown', function(e) {
    if (e.metaKey || e.ctrlKey) return;
    // / focuses the filter input
    if (e.key === '/' && e.target !== input) {
      e.preventDefault();
      input.focus();
      return;
    }
    if (e.target === input) {
      if (e.key === 'Escape') { input.blur(); input.value = ''; filterRows(); return; }
      if (e.key === 'Enter' && visible.length === 1) { var a = visible[0].querySelector('a'); if (a) a.click(); return; }
      return;
    }
    if (e.key === 'j') { e.preventDefault(); focus(idx + 1); }
    else if (e.key === 'k') { e.preventDefault(); focus(idx - 1); }
    else if ((e.key === 'Enter' || e.key === 'o') && idx >= 0) {
      var link = visible[idx].querySelector('a');
      if (link) link.click();
    }
    else if (e.key === 'Escape' && idx >= 0) { visible[idx].classList.remove('bg-accent/10'); idx = -1; }
  });
})();
</script>
{{end}}
