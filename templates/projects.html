{{define "content"}}
<div class="flex items-center gap-3 mb-6">
  <a href="/" class="text-muted-foreground hover:text-foreground transition-colors text-sm font-sans">&larr; Dashboard</a>
</div>

<h1 class="text-2xl font-bold mb-1 tracking-tight">All Projects</h1>
<p class="text-sm text-muted-foreground font-sans mb-6">{{len .ProjectsList}} projects</p>

<div class="overflow-x-auto rounded-lg border border-border bg-card shadow-sm">
  <table class="w-full text-sm font-sans">
    <thead>
      <tr class="border-b border-border">
        <th class="text-left px-3 py-2 text-[0.6rem] uppercase tracking-widest text-muted-foreground font-semibold">Project</th>
        <th class="text-right px-3 py-2 text-[0.6rem] uppercase tracking-widest text-muted-foreground font-semibold">Sessions</th>
        <th class="text-left px-3 py-2 text-[0.6rem] uppercase tracking-widest text-muted-foreground font-semibold">Last Active</th>
      </tr>
    </thead>
    <tbody>
      {{range .ProjectsList}}
      <tr class="border-b border-border/50 hover:bg-muted/30 transition-colors">
        <td class="px-3 py-2">
          <a href="/project/{{.Name}}" class="text-sm font-mono text-secondary hover:text-accent transition-colors font-medium">{{.Name}}</a>
        </td>
        <td class="px-3 py-2 text-right">
          <span class="bg-accent text-accent-foreground px-1.5 py-0.5 rounded text-[0.6rem] font-bold font-sans">{{.Count}}</span>
        </td>
        <td class="px-3 py-2 text-xs font-mono text-muted-foreground">{{.LastDate}}</td>
      </tr>
      {{end}}
    </tbody>
  </table>
</div>

<script>
(function() {
  var rows = document.querySelectorAll('tbody tr');
  var idx = -1;
  function focus(i) {
    if (i < 0 || i >= rows.length) return;
    if (idx >= 0) rows[idx].classList.remove('bg-accent/10');
    idx = i;
    rows[idx].classList.add('bg-accent/10');
    rows[idx].scrollIntoView({block: 'nearest'});
  }
  document.addEventListener('keydown', function(e) {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    if (e.metaKey || e.ctrlKey) return;
    if (e.key === 'j') { e.preventDefault(); focus(idx + 1); }
    else if (e.key === 'k') { e.preventDefault(); focus(idx - 1); }
    else if ((e.key === 'Enter' || e.key === 'o') && idx >= 0) {
      var link = rows[idx].querySelector('a');
      if (link) link.click();
    }
    else if (e.key === 'Escape' && idx >= 0) { rows[idx].classList.remove('bg-accent/10'); idx = -1; }
  });
})();
</script>
{{end}}
