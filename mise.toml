[tools]
go = "1.25"
usage = "latest"

[tasks.build]
description = "Build cc-journal binary"
run = "go build -o cc-journal ."

[tasks.vet]
description = "Run go vet"
run = "go vet ./..."

[tasks.check]
description = "Build and vet"
depends = ["build", "vet"]

[tasks.dev]
description = "Build and install dev version locally via mise"
run = """
mkdir -p ~/.local/share/mise/installs/github-natefaerber-cc-journal/dev
go build -o ~/.local/share/mise/installs/github-natefaerber-cc-journal/dev/cc-journal .
mise use --path mise.local.toml "github:natefaerber/cc-journal@dev"
echo "Dev build installed. Run 'mise x -- cc-journal <cmd>' or open a new shell."
echo "Run 'mise run dev:revert' to revert."
"""

[tasks."dev:revert"]
description = "Revert to the released version of cc-journal"
run = """
rm -f mise.local.toml
echo "Reverted to global mise config."
"""

[tasks.serve]
description = "Build and start the dev server"
depends = ["serve:stop"]
run = "go run . serve"

[tasks."serve:stop"]
description = "Kill any running cc-journal server"
run = """
pkill -f 'cc-journal.*serve' 2>/dev/null && echo "Stopped cc-journal server." || echo "No cc-journal server running."
"""

[tasks.clean]
description = "Remove build artifacts"
run = "rm -f cc-journal"

[tasks.render]
description = "Generate completions and docs from usage spec"
depends = ["render:*"]

[tasks."render:completions"]
description = "Generate shell completions from usage spec"
run = """
mkdir -p completions
usage g completion bash -f cc-journal.usage.kdl cc-journal > completions/cc-journal.bash
usage g completion zsh -f cc-journal.usage.kdl cc-journal > completions/_cc-journal
usage g completion fish -f cc-journal.usage.kdl cc-journal > completions/cc-journal.fish
echo "Generated completions in completions/"
"""

[tasks."render:docs"]
description = "Generate markdown CLI docs from usage spec"
run = """
rm -rf docs/cli && mkdir -p docs/cli
usage g markdown -mf cc-journal.usage.kdl --out-dir docs/cli
echo "Generated docs in docs/cli/"
"""
